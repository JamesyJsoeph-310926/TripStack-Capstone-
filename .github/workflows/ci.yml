name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ui-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tag: [journey, negative, resilience]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install UI deps
        run: npm ci
        working-directory: ui-tests
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        working-directory: ui-tests
      - name: Run UI tests
        run: npx playwright test --grep "@${{ matrix.tag }}"
        working-directory: ui-tests
      - name: Upload UI Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-allure-${{ matrix.tag }}
          path: ui-tests/allure-results

  api-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tag: [journey, negative, resilience]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Run API tests
        run: mvn test -Dtest.groups=${{ matrix.tag }}
        working-directory: api-tests
      - name: Upload API Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-allure-${{ matrix.tag }}
          path: api-tests/target/allure-results

  performance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run k6 baseline
        uses: grafana/k6-action@v0.3.0
        with:
          script: perf/k6/baseline.js

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ZAP baseline
        run: bash security/zap/run-baseline-scan.sh

  publish-evidence:
    runs-on: ubuntu-latest
    needs: [ui-tests, api-tests, performance, security]
    steps:
      - uses: actions/checkout@v4
      - name: Publish combined evidence bundle
        run: echo 'Combined evidence bundle ready'

  quality-gate:
    runs-on: ubuntu-latest
    needs: [ui-tests, api-tests, performance, security, publish-evidence]
    steps:
      - run: echo 'Quality gate passed'
